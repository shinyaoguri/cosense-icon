<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cosense-icon editor</title>
<meta name="description" content="Cosense ページアイコンを URL から動的に生成するエディタ。テキストと色を URL に埋め込むだけで SVG アイコンが作れる。">
<meta property="og:type" content="website">
<meta property="og:title" content="cosense-icon editor">
<meta property="og:description" content="テキストと色を URL に埋め込むだけで SVG アイコンが作れるエディタ。">

<meta property="og:url" content="__OG_URL__">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="cosense-icon editor">
<meta name="twitter:image" content="__OG_IMAGE__">
<link rel="icon" type="image/svg+xml" href="/cosense-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/wawoff2@2.0.1/build/decompress_binding.js" defer></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onloadTurnstileCallback&render=explicit" async defer onerror="console.error('Turnstile script load failed')"></script>
<style>
:root {
  --bg: #060a14;
  --bg-elev: #0f172a;
  --surface: #141d33;
  --surface-hover: #1d2943;
  --border: #273149;
  --border-strong: #3b4a6b;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --text-faint: #64748b;
  --accent: #38bdf8;
  --accent-hover: #7dd3fc;
  --accent-soft: rgba(56, 189, 248, 0.12);
  --success: #4ade80;
  --success-soft: rgba(74, 222, 128, 0.1);
  --warn: #fbbf24;
  --warn-soft: rgba(251, 191, 36, 0.1);
  --error: #f87171;
  --error-soft: rgba(248, 113, 113, 0.1);
  --violet: #a78bfa;
  --violet-soft: rgba(167, 139, 250, 0.12);
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.25);
  --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.45);
  --shadow-ring: 0 0 0 3px var(--accent-soft);
  --transition: 160ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-fast: 120ms cubic-bezier(0.4, 0, 0.2, 1);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', Meiryo, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }

/* フォーカスリング: ボタン系は outline、入力系は box-shadow リング */
:focus { outline: none; }
button:focus-visible,
[role="radio"]:focus-visible,
.font-picker-btn:focus-visible,
.size-step-btn:focus-visible,
.weight-seg:focus-visible,
.align-seg:focus-visible,
.preset-btn:focus-visible,
.rotate-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
body {
  font-family: var(--font-sans);
  font-feature-settings: "cv11", "ss01", "ss03";
  background: radial-gradient(ellipse at 20% -10%, #11213f 0%, var(--bg) 55%);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* header */
header {
  flex: none;
  padding: 0.65rem 1.5rem 0.65rem 2rem;
  border-bottom: 1px solid var(--border);
  background: rgba(15, 23, 42, 0.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  gap: 1.5rem;
}
.header-title {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: baseline;
  gap: 0.9rem;
  overflow: hidden;
}
header h1 {
  margin: 0;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: -0.015em;
  display: inline-flex;
  align-items: center;
  gap: 0.55rem;
  flex: none;
}
header h1::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
}
header p {
  margin: 0;
  color: var(--text-faint);
  font-size: 0.76rem;
  font-weight: 400;
  letter-spacing: -0.005em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-actions {
  flex: none;
  display: flex;
  align-items: center;
  gap: 0.55rem;
}
.header-actions-label {
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-faint);
  font-weight: 600;
}
.header-download-group {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-elev);
  overflow: hidden;
}
.header-download-group .download-btn {
  border: 0;
  border-right: 1px solid var(--border);
  border-radius: 0;
  padding: 0.4rem 0.75rem;
  background: transparent;
  color: var(--text-muted);
  font: inherit;
  font-size: 0.76rem;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.header-download-group .download-btn:last-child { border-right: 0; }
.header-download-group .download-btn:hover {
  background: var(--accent-soft);
  color: var(--accent);
}
.header-download-group .download-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  color: var(--text-faint);
}
.header-ghost-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: var(--radius-md);
  padding: 0.4rem 0.75rem;
  font: inherit;
  font-size: 0.76rem;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  transition: all var(--transition);
}
.header-ghost-btn svg {
  width: 14px;
  height: 14px;
  flex: none;
}
.header-ghost-btn:hover {
  border-color: var(--error);
  color: var(--error);
  background: var(--error-soft);
}
.header-ghost-btn:active { transform: translateY(1px); }
.header-ghost-btn.flash {
  border-color: var(--success);
  color: var(--success);
  background: var(--success-soft);
}
.header-divider {
  width: 1px;
  height: 22px;
  background: var(--border);
}
.header-ghost-btn.header-fav-btn:hover,
.header-ghost-btn.header-fav-btn[aria-expanded="true"] {
  border-color: var(--warn);
  color: var(--warn);
  background: var(--warn-soft);
}
.header-badge {
  background: var(--warn);
  color: #1a1207;
  font-size: 0.66rem;
  font-weight: 700;
  border-radius: 99px;
  padding: 0.1rem 0.4rem;
  min-width: 1.1rem;
  text-align: center;
  font-variant-numeric: tabular-nums;
  line-height: 1.3;
}
.header-badge[hidden] { display: none; }

/* お気に入り右ペイン */
.fav-pane {
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
  min-height: 0;
  max-height: 100%;
  padding: 1rem 1.1rem;
  overflow: hidden;
}
.fav-pane[hidden] { display: none; }
.fav-pane-head {
  flex: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
}
.fav-pane-head h2 {
  margin: 0;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-faint);
  font-weight: 600;
}
.fav-pane-close {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-faint);
  width: 26px;
  height: 26px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font: inherit;
  font-size: 1rem;
  line-height: 1;
  transition: all var(--transition);
  flex: none;
}
.fav-pane-close:hover {
  border-color: var(--border);
  color: var(--text);
  background: var(--surface-hover);
}
.fav-save-btn {
  flex: none;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius-md);
  padding: 0.55rem 0.75rem;
  font: inherit;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.45rem;
  transition: all var(--transition);
}
.fav-save-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}
.fav-save-btn svg {
  width: 16px;
  height: 16px;
  fill: none;
  stroke: currentColor;
}
.fav-save-btn.saved {
  border-color: var(--warn);
  color: var(--warn);
  background: var(--warn-soft);
}
.fav-save-btn.saved svg { fill: var(--warn); }
.fav-save-btn.saved:hover {
  border-color: var(--error);
  color: var(--error);
  background: var(--error-soft);
}
.fav-save-btn.saved:hover svg { fill: var(--error); stroke: var(--error); }
.fav-list {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  padding-right: 2px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
}
.fav-list::-webkit-scrollbar { width: 8px; }
.fav-list::-webkit-scrollbar-thumb {
  background: var(--border-strong);
  border-radius: 4px;
  border: 2px solid var(--surface);
}
.fav-card {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  padding: 0.4rem 0.45rem;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  transition: all var(--transition);
  cursor: pointer;
  font: inherit;
  text-align: left;
  color: var(--text-muted);
}
.fav-card:hover {
  border-color: var(--accent);
  background: var(--accent-soft);
  color: var(--accent);
}
.fav-card .thumb {
  flex: none;
  width: 56px;
  height: 40px;
  background:
    linear-gradient(45deg, rgba(39, 49, 73, 0.4) 25%, transparent 25%) 0 0/8px 8px,
    linear-gradient(-45deg, rgba(39, 49, 73, 0.4) 25%, transparent 25%) 0 0/8px 8px,
    var(--bg);
  border-radius: var(--radius-sm);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fav-card .thumb img {
  max-width: 100%;
  max-height: 100%;
  display: block;
}
.fav-card .label {
  flex: 1;
  min-width: 0;
  font-size: 0.78rem;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.fav-card.current {
  border-color: var(--warn);
  background: var(--warn-soft);
}
.fav-card .del {
  flex: none;
  background: transparent;
  border: 0;
  color: var(--text-faint);
  width: 22px;
  height: 22px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  line-height: 1;
  font: inherit;
  transition: all var(--transition);
  opacity: 0.6;
}
.fav-card .del:hover {
  background: var(--error-soft);
  color: var(--error);
  opacity: 1;
}
.fav-empty {
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-faint);
  padding: 2.5rem 0.5rem;
  line-height: 1.7;
}

/* main */
main {
  flex: 1 1 auto;
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(340px, 420px) 1fr;
  gap: 1.25rem;
  padding: 1.25rem 2rem;
  max-width: 1360px;
  width: 100%;
  margin: 0 auto;
  overflow: hidden;
  transition: grid-template-columns var(--transition);
}
main.fav-open {
  grid-template-columns: minmax(320px, 380px) 1fr 280px;
  max-width: 1640px;
}
@media (max-width: 1180px) {
  main.fav-open { grid-template-columns: minmax(300px, 360px) 1fr 250px; }
}
@media (max-width: 820px) {
  html, body { height: auto; overflow: visible; }
  body { display: block; }
  main { grid-template-columns: 1fr; padding: 1rem; gap: 1rem; overflow: visible; }
  main.fav-open { grid-template-columns: 1fr; }
  form.panel { max-height: none; overflow: visible; }
  .preview-wrap { overflow: visible; }
  .fav-pane { max-height: none; overflow: visible; }
  .fav-list { max-height: 50vh; }
  /* モバイル: タッチターゲット拡大 */
  .resize-handle { width: 16px; height: 16px; }
  .handle-tl { top: -9px; left: -9px; }
  .handle-tr { top: -9px; right: -9px; }
  .handle-bl { bottom: -9px; left: -9px; }
  .handle-br { bottom: -9px; right: -9px; }
  .handle-t { top: -9px; margin-left: -8px; }
  .handle-b { bottom: -9px; margin-left: -8px; }
  .handle-l { left: -9px; margin-top: -8px; }
  .handle-r { right: -9px; margin-top: -8px; }
  .padding-handle, .radius-handle { width: 14px; height: 14px; margin: -7px 0 0 -7px; }
  .padding-handle { margin: 0 -7px -7px 0; }
  /* モバイルでもハンドルは常時 visible (hover 不要) */
  .preview-frame::before,
  .resize-handle, .padding-handle, .radius-handle { opacity: 0.7; }
  .resize-handle.dragging, .padding-handle.dragging, .radius-handle.dragging { opacity: 1; }
  /* フォームのフォントを少し大きくしてタップしやすく */
  .field input[type=number] { width: auto; flex: 1; min-width: 4rem; }
  .url-row button { padding: 0.55rem 1rem; min-height: 36px; }
  .preset-btn { min-height: 32px; }
  .size-step-btn, .weight-seg, .align-seg, .fill-mode-seg { padding-top: 0.5rem; padding-bottom: 0.5rem; }
  /* ヘッダーダウンロード: モバイルでは横並びで折り返さない */
  header { flex-wrap: wrap; padding: 0.6rem 1rem; gap: 0.7rem; }
  .header-title { flex-basis: 100%; }
  .header-actions { width: 100%; justify-content: flex-end; flex-wrap: wrap; }
  .header-actions-label { display: none; }
  .header-divider { display: none; }
  .header-download-group .download-btn { padding: 0.5rem 0.7rem; min-height: 36px; }
  .header-ghost-btn { padding: 0.5rem 0.7rem; min-height: 36px; }
  .header-ghost-btn span { display: none; }
}

/* panel */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 1.15rem 1.3rem;
  box-shadow: var(--shadow-md);
  background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.012) 0%, transparent 60%);
}

/* 左カラム: form は中でスクロール */
form.panel {
  max-height: 100%;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
}
form.panel::-webkit-scrollbar { width: 8px; }
form.panel::-webkit-scrollbar-track { background: transparent; }
form.panel::-webkit-scrollbar-thumb {
  background: var(--border-strong);
  border-radius: 4px;
  border: 2px solid var(--surface);
}
.panel h2 {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-faint);
  margin: 0 0 0.85rem;
  font-weight: 600;
}
.panel h2:not(:first-child),
.panel .row-head:not(:first-child) {
  margin-top: 1.25rem;
}

.row-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 0 0 0.8rem;
  gap: 0.5rem;
}
.row-head h2 { margin: 0; }
.row-head-tools {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  flex: none;
}

/* Keynote 風セクションプレート */
.fill-section,
.effect-section {
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
  padding: 0.7rem 0.85rem 0.8rem;
  background: rgba(15, 23, 42, 0.45);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
.fill-section .field,
.effect-section .field { margin-bottom: 0; }
.fill-section .color-fields { gap: 0.4rem; }

/* fill-body: 単色時は縦、グラデ時は左右2列 (Keynote 風) */
.fill-body {
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
}
.fill-stops {
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
  min-width: 0;
}
.fill-section[data-fill="gradient"] .fill-body {
  flex-direction: row;
  gap: 0.85rem;
  align-items: center;
  animation: fillGradReveal var(--transition) ease-out;
}
.fill-section[data-fill="gradient"] .fill-stops { flex: 1; }
.fill-section[data-fill="solid"] .grad-only { display: none; }
@keyframes fillGradReveal {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* グラデ角度ダイヤル (Keynote 風) */
.grad-angle-wrap {
  flex: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.35rem;
}
.grad-dial {
  width: 78px;
  height: 78px;
  background: transparent;
  border: 0;
  padding: 0;
  cursor: grab;
  touch-action: none;
  border-radius: 50%;
  transition: transform var(--transition-fast);
  user-select: none;
  -webkit-user-select: none;
}
.grad-dial:hover { transform: scale(1.04); }
.grad-dial.dragging,
.grad-dial:active { cursor: grabbing; transform: scale(1.02); }
.grad-dial svg {
  width: 100%;
  height: 100%;
  display: block;
  pointer-events: none;
}
.grad-dial:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
}
.grad-dial #gradAngleNeedle {
  transition: transform 80ms linear;
  transform-origin: 0 0;
}
.grad-dial.dragging #gradAngleNeedle {
  transition: none;
}
.grad-angle-num {
  display: inline-flex;
  align-items: center;
  gap: 0.15rem;
}
.grad-angle-num input[type=number] {
  width: 3.6rem;
  text-align: center;
  background: var(--bg-elev);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.28rem 0.4rem;
  font: inherit;
  font-size: 0.78rem;
  font-variant-numeric: tabular-nums;
  flex: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.grad-angle-num input[type=number]:hover { border-color: var(--border-strong); }
.grad-angle-num input[type=number]:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.grad-angle-num .unit {
  font-size: 0.7rem;
  color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}

/* 塗り種類 segmented control (Keynote 風) */
.fill-mode-segmented {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-elev);
  overflow: hidden;
  flex: 1;
}
.fill-mode-seg {
  flex: 1;
  background: transparent;
  border: 0;
  border-right: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0.35rem 0.6rem;
  cursor: pointer;
  font: inherit;
  font-size: 0.78rem;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  line-height: 1;
  transition: background var(--transition), color var(--transition);
}
.fill-mode-seg:last-child { border-right: 0; }
.fill-mode-seg svg {
  width: 14px;
  height: 14px;
  display: block;
  color: currentColor;
}
.fill-mode-seg:hover {
  background: var(--surface-hover);
  color: var(--text);
}
.fill-mode-seg.active {
  background: var(--accent-soft);
  color: var(--accent);
}
.fill-mode-seg:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* field */
.field {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.55rem;
  font-size: 0.85rem;
}
.field > label {
  color: var(--text-muted);
  min-width: 3.8rem;
  flex: none;
  font-weight: 500;
  font-size: 0.8rem;
}
.field input[type=text],
.field select,
.field textarea {
  flex: 1;
  min-width: 0;
  background: var(--bg-elev);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.45rem 0.6rem;
  font: inherit;
  font-size: 0.85rem;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.field input[type=number] {
  background: var(--bg-elev);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.4rem 0.5rem;
  font: inherit;
  font-size: 0.85rem;
  width: 4.8rem;
  flex: none;
  text-align: right;
  transition: border-color var(--transition), box-shadow var(--transition);
  font-variant-numeric: tabular-nums;
}
.field input:hover:not(:focus):not(:disabled),
.field select:hover:not(:focus),
.field textarea:hover:not(:focus) {
  border-color: var(--border-strong);
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
/* ハンドルドラッグ中に該当 input をハイライト */
.field input.dragging {
  border-color: var(--accent);
  box-shadow: var(--shadow-ring);
}
.field input:disabled { opacity: 0.45; cursor: not-allowed; }
.field input[type=color] {
  width: 2.2rem;
  height: 2.2rem;
  padding: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: transparent;
  cursor: pointer;
  flex: none;
  transition: border-color var(--transition), transform var(--transition);
}
.field input[type=color]:hover {
  border-color: var(--border-strong);
  transform: scale(1.05);
}
.field input[type=checkbox] {
  accent-color: var(--accent);
  margin: 0;
  flex: none;
  width: 1rem;
  height: 1rem;
  cursor: pointer;
}
.field textarea { min-height: 5rem; resize: vertical; font-family: inherit; }
.field .unit {
  color: var(--text-faint);
  font-size: 0.72rem;
  flex: none;
  font-variant-numeric: tabular-nums;
}

/* slider */
input[type=range] {
  flex: 1;
  min-width: 0;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  padding: 0;
  margin: 0;
  cursor: pointer;
  transition: background var(--transition);
}
input[type=range]:hover { background: var(--border-strong); }
input[type=range]:disabled { opacity: 0.35; cursor: not-allowed; }
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid var(--bg-elev);
  box-shadow: 0 0 0 1px var(--border-strong);
  transition: transform var(--transition), box-shadow var(--transition);
}
input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
  box-shadow: 0 0 0 1px var(--accent);
}
input[type=range]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid var(--bg-elev);
  box-shadow: 0 0 0 1px var(--border-strong);
}

/* row */
.row { display: flex; gap: 0.75rem; }
.row > * { flex: 1; }

/* サイズ row: 4 つの数値入力をコンパクトに */
.size-row { gap: 0.45rem; }
.size-row .field { gap: 0.4rem; min-width: 0; }
.size-row .field > label {
  min-width: auto;
  font-size: 0.78rem;
}
.size-row .field input[type=number] {
  width: auto;
  flex: 1;
  min-width: 0;
  text-align: right;
}

/* stack */
.stack {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
  margin-bottom: 0.55rem;
}
.stack textarea {
  background: var(--bg-elev);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.15rem;
  font: inherit;
  font-size: 1.2rem;
  font-weight: 600;
  min-height: 5.5rem;
  resize: vertical;
  line-height: 1.45;
  letter-spacing: -0.005em;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.stack textarea::placeholder {
  color: var(--text-faint);
  font-weight: 400;
  font-size: 0.95rem;
}
.stack textarea:hover:not(:focus) { border-color: var(--border-strong); }
.stack textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

/* preview */
.preview-wrap {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  min-height: 0;
  overflow: hidden;
}
.preview-box {
  flex: 1 1 auto;
  min-height: 0;
  background-color: #080c18;
  background-image:
    linear-gradient(rgba(39, 49, 73, 0.55) 1px, transparent 1px),
    linear-gradient(90deg, rgba(39, 49, 73, 0.55) 1px, transparent 1px);
  background-size: 32px 32px;
  background-position: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.75rem;
  position: relative;
  overflow: hidden;
}
.preview-box::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(8, 12, 24, 0.75) 100%);
  pointer-events: none;
}
.preview-frame {
  position: relative;
  z-index: 1;
  max-width: 100%;
  max-height: 100%;
  display: block;
}
.preview-frame img {
  width: 100%;
  height: 100%;
  display: block;
  box-shadow: var(--shadow-lg);
  border-radius: 2px;
}
/* 選択枠 (PowerPoint 風) */
.preview-frame::before {
  content: '';
  position: absolute;
  inset: -1px;
  border: 1px solid var(--accent);
  pointer-events: none;
  opacity: 0;
  transition: opacity var(--transition-fast);
  z-index: 2;
}
.preview-box:hover .preview-frame::before,
.preview-frame.dragging::before { opacity: 0.85; }

/* リサイズハンドル: 8 個の小さな白丸 */
.resize-handle {
  position: absolute;
  width: 10px;
  height: 10px;
  background: #fff;
  border: 1.5px solid var(--accent);
  border-radius: 50%;
  z-index: 3;
  opacity: 0;
  transition: opacity var(--transition-fast), transform var(--transition-fast);
  box-shadow: var(--shadow-sm);
  touch-action: none;
}
.preview-box:hover .resize-handle,
.resize-handle.dragging { opacity: 1; }
.resize-handle:hover { transform: scale(1.3); }
.resize-handle.dragging { transform: scale(1.3); }

/* 四隅 */
.handle-tl { top: -6px; left: -6px; cursor: nwse-resize; }
.handle-tr { top: -6px; right: -6px; cursor: nesw-resize; }
.handle-bl { bottom: -6px; left: -6px; cursor: nesw-resize; }
.handle-br { bottom: -6px; right: -6px; cursor: nwse-resize; }
/* 各辺中点 */
.handle-t { top: -6px; left: 50%; margin-left: -5px; cursor: ns-resize; }
.handle-b { bottom: -6px; left: 50%; margin-left: -5px; cursor: ns-resize; }
.handle-l { left: -6px; top: 50%; margin-top: -5px; cursor: ew-resize; }
.handle-r { right: -6px; top: 50%; margin-top: -5px; cursor: ew-resize; }

/* サイズ表示バッジ (PowerPoint 風) */
.size-readout {
  position: absolute;
  top: 0.85rem;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15, 23, 42, 0.85);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 3px 10px;
  font-size: 0.72rem;
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  transition: opacity var(--transition-fast);
}
.preview-box:hover .size-readout,
.preview-frame.dragging ~ .size-readout { opacity: 1; }

/* 余白 (padding) ガイドとハンドル */
.padding-frame {
  position: absolute;
  pointer-events: none;
  border: 1px dashed var(--accent);
  opacity: 0;
  transition: opacity var(--transition-fast);
  z-index: 2;
}
.preview-box:hover .padding-frame,
.preview-frame.dragging .padding-frame { opacity: 0.5; }
.padding-handle {
  position: absolute;
  width: 9px;
  height: 9px;
  background: var(--accent);
  border: 1.5px solid #fff;
  border-radius: 50%;
  pointer-events: auto;
  z-index: 4;
  opacity: 0;
  transition: opacity var(--transition-fast), transform var(--transition-fast);
  box-shadow: var(--shadow-sm);
  touch-action: none;
  cursor: nwse-resize;
  margin: 0 -5px -5px 0;
}
.preview-box:hover .padding-handle,
.padding-handle.dragging { opacity: 1; }
.padding-handle:hover { transform: scale(1.3); }
.padding-handle.dragging { transform: scale(1.3); }

/* 角丸ハンドル (PowerPoint 風 黄色) */
.radius-handle {
  position: absolute;
  width: 9px;
  height: 9px;
  background: var(--warn);
  border: 1.5px solid #fff;
  border-radius: 50%;
  pointer-events: auto;
  z-index: 5;
  opacity: 0;
  transition: opacity var(--transition-fast), transform var(--transition-fast);
  box-shadow: var(--shadow-sm);
  touch-action: none;
  cursor: nwse-resize;
  margin: -5px 0 0 -5px;
}
.preview-box:hover .radius-handle,
.radius-handle.dragging { opacity: 1; }
.radius-handle:hover { transform: scale(1.3); }
.radius-handle.dragging { transform: scale(1.3); }
.preview-wrap > .panel { flex: none; }

/* URL box */
.url-box h2 { margin-top: 0; }
.url-box h2.sub { margin-top: 1rem; }
.url-row {
  display: flex;
  gap: 0.5rem;
}
.url-row input {
  flex: 1;
  min-width: 0;
  background: var(--bg-elev);
  color: var(--accent);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.55rem 0.85rem;
  font-family: var(--font-mono);
  font-size: 0.76rem;
  letter-spacing: -0.01em;
  font-variant-ligatures: none;
  transition: border-color var(--transition);
}
.url-row input:hover { border-color: var(--border-strong); }
.url-row input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.url-row input.pending {
  color: var(--text-faint);
  font-style: italic;
  border-style: dashed;
  background:
    repeating-linear-gradient(
      135deg,
      transparent 0,
      transparent 8px,
      rgba(251, 191, 36, 0.06) 8px,
      rgba(251, 191, 36, 0.06) 16px
    ),
    var(--bg-elev);
}
.url-row button {
  background: var(--accent);
  color: #07101f;
  border: 0;
  border-radius: var(--radius-md);
  padding: 0 1.1rem;
  font-weight: 600;
  cursor: pointer;
  font: inherit;
  font-size: 0.82rem;
  transition: background var(--transition), transform var(--transition);
  flex: none;
  min-width: 5rem;
}
.url-row button:hover { background: var(--accent-hover); }
.url-row button:active { transform: translateY(1px); }
.url-row button.copied { background: var(--success); }
.url-row button:disabled {
  background: var(--border-strong);
  color: var(--text-faint);
  cursor: not-allowed;
  transform: none;
}

/* help text */
.help {
  font-size: 0.75rem;
  color: var(--text-faint);
  margin: 0.75rem 0 0;
  line-height: 1.55;
}
.help code {
  background: var(--bg-elev);
  color: var(--text);
  padding: 0.05em 0.4em;
  border-radius: var(--radius-sm);
  font-size: 0.95em;
  font-family: var(--font-mono);
  border: 1px solid var(--border);
}

/* preset chips */
.presets {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}
.preset-btn {
  background: var(--bg-elev);
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 0.32rem 0.85rem;
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  font: inherit;
  line-height: 1.2;
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.35rem;
}
.preset-btn .dice-icon {
  width: 14px;
  height: 14px;
  display: block;
  flex: none;
}
.preset-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}
.preset-btn.reset-btn { color: var(--text-faint); }
.preset-btn.reset-btn:hover {
  border-color: var(--error);
  color: var(--error);
  background: var(--error-soft);
}
.preset-btn.random-btn {
  background: transparent;
  border: 0;
  padding: 0.25rem;
  color: var(--text-muted);
}
.preset-btn.random-btn:hover {
  background: transparent;
  border: 0;
  color: var(--violet);
}
.preset-btn.random-btn .dice-icon {
  width: 22px;
  height: 22px;
}
@keyframes diceSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.dice-icon.spinning {
  animation: diceSpin 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* contrast label (badge) */
.contrast-label {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-faint);
  padding: 0.25rem 0.6rem;
  border-radius: 99px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  margin: 0;
  font-variant-numeric: tabular-nums;
  line-height: 1.2;
}
.contrast-label::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.7;
}
.contrast-label.ok {
  color: var(--success);
  border-color: rgba(74, 222, 128, 0.35);
  background: var(--success-soft);
}
.contrast-label.warn {
  color: var(--warn);
  border-color: rgba(251, 191, 36, 0.35);
  background: var(--warn-soft);
}
.contrast-label.ng {
  color: var(--error);
  border-color: rgba(248, 113, 113, 0.35);
  background: var(--error-soft);
}

.custom-font { margin-top: 0.25rem; display: none; }
.custom-font.show { display: flex; }

/* インフォメーションのアイコン (hover でツールチップ) */
.info-tip {
  display: none;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--bg-elev);
  color: var(--text-faint);
  border: 1px solid var(--border);
  cursor: help;
  position: relative;
  flex: none;
  font-style: italic;
  font-family: 'Times New Roman', serif;
  font-size: 0.72rem;
  font-weight: 600;
  line-height: 1;
  transition: color var(--transition), border-color var(--transition);
}
.info-tip.show { display: inline-flex; }
.info-tip:hover, .info-tip:focus-visible {
  color: var(--accent);
  border-color: var(--accent);
  outline: none;
}
.info-tip::before { content: 'i'; }
.info-tip::after {
  content: attr(data-tip);
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.55rem 0.7rem;
  font-size: 0.72rem;
  font-style: normal;
  font-family: inherit;
  font-weight: 400;
  width: max-content;
  max-width: 240px;
  box-shadow: var(--shadow-md);
  pointer-events: none;
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity var(--transition-fast), transform var(--transition-fast);
  z-index: 100;
  text-align: left;
  line-height: 1.5;
  white-space: normal;
}
.info-tip:hover::after,
.info-tip:focus-visible::after {
  opacity: 1;
  transform: translateY(0);
}

/* テキスト入力ラッパ: 絵文字トリガをコーナーに重ねるため relative */
.text-input-wrap {
  position: relative;
  width: 100%;
  display: block;
}
.text-input-wrap textarea {
  width: 100%;
  display: block;
  /* 右下に絵文字ボタンを配置するため余白を確保 */
  padding-right: 3.2rem;
  padding-bottom: 2.4rem;
}

/* 絵文字トリガ: テキストボックス右下に重ねる小さいアイコンボタン */
.emoji-trigger {
  position: absolute;
  bottom: 0.5rem;
  right: 1.1rem; /* 右下のリサイズグリップを避ける */
  width: 1.85rem;
  height: 1.85rem;
  padding: 0;
  border: 1px solid transparent;
  background: rgba(15, 23, 42, 0.55);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  color: var(--text-muted);
  border-radius: var(--radius-md);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0.55;
  transition: all var(--transition-fast);
  font: inherit;
  z-index: 2;
}
.emoji-trigger .emoji-trigger-icon {
  font-size: 1.05rem;
  line-height: 1;
  filter: grayscale(0.05);
  font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
}
.text-input-wrap:hover .emoji-trigger,
.emoji-trigger:focus-visible {
  opacity: 1;
  border-color: var(--border);
}
.emoji-trigger:hover {
  border-color: var(--accent);
  background: var(--accent-soft);
  transform: translateY(-1px);
}
.emoji-trigger[aria-expanded="true"] {
  opacity: 1;
  background: var(--accent-soft);
  border-color: var(--accent);
}

/* 絵文字パネル: フローティング・ポップオーバー (form の overflow を抜けるため fixed) */
.emoji-panel {
  position: fixed;
  width: min(360px, calc(100vw - 16px));
  max-width: 360px;
  z-index: 1000;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform-origin: bottom right;
  animation: emojiPopIn 140ms cubic-bezier(0.2, 0.9, 0.3, 1);
}
.emoji-panel[hidden] { display: none; }
@keyframes emojiPopIn {
  from { opacity: 0; transform: translateY(6px) scale(0.97); }
  to   { opacity: 1; transform: none; }
}
.emoji-search {
  flex: none;
  padding: 0.5rem 0.55rem 0.4rem;
  border-bottom: 1px solid var(--border);
}
.emoji-search input {
  width: 100%;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.32rem 0.5rem;
  font: inherit;
  font-size: 0.8rem;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.emoji-search input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.emoji-tabs {
  flex: none;
  display: flex;
  gap: 0.05rem;
  padding: 0.3rem 0.4rem 0;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.emoji-tabs::-webkit-scrollbar { display: none; }
.emoji-tab {
  flex: none;
  background: transparent;
  border: 0;
  padding: 0.32rem 0.5rem;
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  transition: background var(--transition-fast), color var(--transition-fast);
}
.emoji-tab:hover { background: var(--surface-hover); }
.emoji-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--accent-soft);
}
.emoji-grid-scroll {
  flex: 1 1 auto;
  min-height: 0;
  max-height: 280px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
}
.emoji-grid-scroll::-webkit-scrollbar { width: 8px; }
.emoji-grid-scroll::-webkit-scrollbar-thumb {
  background: var(--border-strong);
  border-radius: 4px;
  border: 2px solid var(--bg-elev);
}
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(28px, 1fr));
  gap: 0.05rem;
  padding: 0.4rem 0.5rem 0.5rem;
}
.emoji-cat-header {
  grid-column: 1 / -1;
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-faint);
  font-weight: 600;
  padding: 0.45rem 0.1rem 0.2rem;
}
.emoji-cat-header:first-child { padding-top: 0.1rem; }
.emoji-grid button {
  background: transparent;
  border: 0;
  cursor: pointer;
  font-size: 1.15rem;
  padding: 0.2rem 0;
  border-radius: var(--radius-sm);
  transition: background var(--transition-fast), transform var(--transition-fast);
  font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
}
.emoji-grid button:hover {
  background: var(--surface-hover);
  transform: scale(1.15);
}
.emoji-empty {
  grid-column: 1 / -1;
  padding: 1.5rem 0.5rem;
  text-align: center;
  color: var(--text-faint);
  font-size: 0.78rem;
}

/* 影 / 縁取り行: チェックが入っていない時は色・数値を控えめに */
.decor-field input[type=color],
.decor-field input[type=number] {
  transition: opacity var(--transition);
}
.decor-field:has(input[type=checkbox]:not(:checked)) input[type=color],
.decor-field:has(input[type=checkbox]:not(:checked)) input[type=number] {
  opacity: 0.45;
  pointer-events: none;
}

/* 字サイズ A-/A+ ボタン (Word 風 - 連結された stepper) */
.size-stepper {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-elev);
  overflow: hidden;
  flex: none;
}
.size-step-btn {
  background: transparent;
  color: var(--text-muted);
  border: 0;
  border-right: 1px solid var(--border);
  border-radius: 0;
  padding: 0.35rem 0.6rem;
  cursor: pointer;
  font: inherit;
  font-size: 0.85rem;
  display: inline-flex;
  align-items: center;
  gap: 0.1rem;
  line-height: 1;
  transition: background var(--transition), color var(--transition);
}
.size-step-btn:last-child { border-right: 0; }
.size-step-btn:hover { background: var(--surface-hover); color: var(--accent); }
.size-step-btn .small { font-size: 0.78em; }
.size-step-btn .large { font-size: 1.1em; }

/* 回転ボタン */
.rotate-btn {
  background: var(--bg-elev);
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.4rem 0.75rem;
  font: inherit;
  font-size: 0.8rem;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  transition: all var(--transition);
  font-variant-numeric: tabular-nums;
}
.rotate-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}
.rotate-btn svg { width: 14px; height: 14px; flex: none; }

/* 太さ segmented control (Word 風) */
.weight-segmented {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-elev);
  overflow: hidden;
  flex: none;
}
.weight-seg {
  background: transparent;
  border: 0;
  border-right: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0.3rem 0.55rem 0.28rem;
  cursor: pointer;
  font: inherit;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.1rem;
  min-width: 2.4rem;
  line-height: 1;
  transition: background var(--transition), color var(--transition);
}
.weight-seg:last-child { border-right: 0; }
.weight-seg .sample { font-size: 0.95rem; }
.weight-seg .num {
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}
.weight-seg:hover { background: var(--surface-hover); color: var(--text); }
.weight-seg.active {
  background: var(--accent-soft);
  color: var(--accent);
}
.weight-seg.active .num { color: var(--accent); opacity: 0.85; }

/* 揃え segmented control (Word 風) */
.align-segmented {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-elev);
  overflow: hidden;
  flex: none;
}
.align-seg {
  background: transparent;
  border: 0;
  border-right: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0.4rem 0.55rem;
  cursor: pointer;
  font: inherit;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition), color var(--transition);
}
.align-seg:last-child { border-right: 0; }
.align-seg:hover { background: var(--surface-hover); color: var(--text); }
.align-seg.active {
  background: var(--accent-soft);
  color: var(--accent);
}
.align-seg svg {
  width: 14px;
  height: 14px;
  display: block;
}

/* font picker */
.font-picker { position: relative; flex: 1; min-width: 0; }
.font-picker-btn {
  width: 100%;
  text-align: left;
  padding: 0.45rem 0.6rem;
  background: var(--bg-elev);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font: inherit;
  font-size: 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.font-picker-btn:hover { border-color: var(--border-strong); }
.font-picker-btn:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.font-picker-btn .caret {
  margin-left: auto;
  opacity: 0.5;
  font-size: 0.7em;
  flex: none;
  transition: transform var(--transition);
}
.font-picker-btn .sample {
  color: var(--text-muted);
  font-size: 0.85em;
  flex: none;
}
.font-picker-overlay {
  position: fixed;
  inset: 0;
  background: rgba(6, 10, 20, 0.65);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 99;
  animation: fpFadeIn var(--transition-fast) ease-out;
}
.font-picker-overlay[hidden] { display: none; }
.font-picker-menu {
  position: fixed;
  top: 5vh;
  bottom: 5vh;
  left: 50%;
  transform: translateX(-50%);
  width: min(960px, calc(100vw - 48px));
  max-height: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  z-index: 100;
  box-shadow: var(--shadow-lg);
  padding: 1rem 1rem 1.25rem;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
  animation: fpSlideIn 180ms cubic-bezier(0.2, 0.9, 0.3, 1);
}
.font-picker-menu[hidden] { display: none; }
@keyframes fpFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fpSlideIn {
  from { opacity: 0; transform: translateX(-50%) translateY(12px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.font-picker-menu-scroll {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
}
.font-picker-menu-scroll::-webkit-scrollbar { width: 10px; }
.font-picker-menu-scroll::-webkit-scrollbar-track { background: transparent; }
.font-picker-menu-scroll::-webkit-scrollbar-thumb {
  background: var(--border-strong);
  border-radius: 5px;
  border: 2px solid var(--surface);
}
.font-picker-menu-title {
  flex: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 0.25rem 0.85rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0.75rem;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
}
.font-picker-close {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.2rem 0.65rem;
  font: inherit;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all var(--transition);
}
.font-picker-close:hover {
  border-color: var(--border-strong);
  color: var(--text);
}
.font-picker-group {
  padding: 0.75rem 0.3rem 0.35rem;
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-faint);
  font-weight: 600;
}
.font-picker-group:first-child { padding-top: 0.25rem; }
.font-picker-items {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 2px;
}
.font-picker-item {
  padding: 0.5rem 0.7rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.6rem;
  cursor: pointer;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  transition: background var(--transition);
  min-width: 0;
}
.font-picker-item:hover { background: var(--surface-hover); }
.font-picker-item.active {
  background: var(--accent-soft);
  color: var(--accent);
}
.font-picker-item.active .sample { color: var(--accent); opacity: 0.85; }
.font-picker-item .name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}
.font-picker-item .sample {
  color: var(--text-muted);
  font-size: 0.95em;
  white-space: nowrap;
  flex: none;
}

/* footer */
footer {
  flex: none;
  text-align: center;
  padding: 0.6rem 1rem;
  color: var(--text-faint);
  font-size: 0.7rem;
  letter-spacing: -0.005em;
  border-top: 1px solid var(--border);
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
footer a {
  color: var(--text-muted);
  text-decoration: none;
  transition: color var(--transition);
}
footer a:hover { color: var(--accent); }

/* 認証モーダル */
.auth-modal {
  position: fixed;
  inset: 0;
  background: rgba(6, 10, 20, 0.65);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fpFadeIn var(--transition-fast) ease-out;
}
.auth-modal.show { display: flex; }
.auth-modal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 1.4rem 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  box-shadow: var(--shadow-lg);
  animation: fpSlideIn 180ms cubic-bezier(0.2, 0.9, 0.3, 1);
}
.auth-modal-title {
  font-size: 0.82rem;
  color: var(--text-muted);
  font-weight: 500;
}
#turnstileWidget { color-scheme: dark; min-height: 65px; }
.auth-modal-cancel {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: var(--radius-md);
  padding: 0.4rem 1.1rem;
  cursor: pointer;
  font: inherit;
  font-size: 0.78rem;
  transition: all var(--transition);
}
.auth-modal-cancel:hover {
  border-color: var(--border-strong);
  color: var(--text);
}

/* 登録が必要な状態のコピーボタン */
.url-row button.needs-register {
  background: var(--warn);
  color: #1a1207;
}
.url-row button.needs-register:hover { background: #fcd34d; }

/* 配色: 1行に bg color/hex - random - fg color/hex を並べる */
.color-fields {
  display: flex;
  gap: 0.45rem;
  align-items: center;
}
.color-fields .color-label {
  color: var(--text-muted);
  font-size: 0.8rem;
  font-weight: 500;
  flex: none;
}
.color-fields input[type=color] {
  width: 2.2rem;
  height: 2.2rem;
  padding: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: transparent;
  cursor: pointer;
  flex: none;
  transition: border-color var(--transition), transform var(--transition);
}
.color-fields input[type=color]:hover {
  border-color: var(--border-strong);
  transform: scale(1.05);
}
.color-fields input[type=text] {
  flex: 1;
  min-width: 0;
  background: var(--bg-elev);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.45rem 0.55rem;
  font: inherit;
  font-size: 0.82rem;
  transition: border-color var(--transition), box-shadow var(--transition);
  font-family: var(--font-mono);
}
.color-fields input[type=text]:hover { border-color: var(--border-strong); }
.color-fields input[type=text]:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
</style>
</head>
<body>
<header>
  <div class="header-title">
    <h1>Cosense Icon Generator</h1>
    <p>テキストと色を URL に埋め込むだけでアイコンを生成する</p>
  </div>
  <div class="header-actions">
    <button type="button" id="favBtn" class="header-ghost-btn header-fav-btn" title="お気に入りペインを開閉" aria-label="お気に入り" aria-expanded="false" aria-controls="favPane">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 15 9 22 10 17 15 18 22 12 18 6 22 7 15 2 10 9 9 12 2"/></svg>
      <span>お気に入り</span>
      <span class="header-badge" id="favCount" hidden>0</span>
    </button>
    <button type="button" id="resetBtn" class="header-ghost-btn" title="初期状態に戻す (⌘Z で取り消し可)" aria-label="リセット">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 10 9 10"/></svg>
      <span>リセット</span>
    </button>
    <span class="header-divider" aria-hidden="true"></span>
    <span class="header-actions-label">ダウンロード</span>
    <div class="header-download-group">
      <button type="button" class="download-btn" data-download="svg">SVG</button>
      <button type="button" class="download-btn" data-download="png" data-scale="1">PNG</button>
      <button type="button" class="download-btn" data-download="png" data-scale="2">@2x</button>
      <button type="button" class="download-btn" data-download="png" data-scale="3">@3x</button>
    </div>
  </div>
</header>
<main>
  <form class="panel" id="form" autocomplete="off">
    <h2 style="margin-top:0;">テキスト</h2>
    <div class="stack">
      <div class="text-input-wrap">
        <textarea id="text" placeholder="Type... / 入力..."></textarea>
        <button type="button" id="emojiBtn" class="emoji-trigger" title="絵文字を挿入" aria-label="絵文字を挿入" aria-expanded="false">
          <span class="emoji-trigger-icon" aria-hidden="true">😀</span>
        </button>
      </div>
    </div>
    <div id="emojiPanel" class="emoji-panel" hidden role="dialog" aria-label="絵文字を選択">
      <div class="emoji-search">
        <input type="search" id="emojiSearch" placeholder="検索 (例: heart, 笑顔)" autocomplete="off" spellcheck="false">
      </div>
      <div class="emoji-tabs" id="emojiTabs" role="tablist" aria-label="カテゴリ"></div>
      <div class="emoji-grid-scroll">
        <div id="emojiGrid" class="emoji-grid"></div>
      </div>
    </div>

    <div class="row-head">
      <h2 style="margin:0;">塗り</h2>
      <div class="row-head-tools">
        <div class="contrast-label" id="contrastLabel" hidden></div>
        <button type="button" id="random" class="preset-btn random-btn" title="ランダムな配色 (WCAG AA)" aria-label="ランダムな配色">
          <svg class="dice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8" cy="8" r="1.3" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="16" cy="16" r="1.3" fill="currentColor" stroke="none"/></svg>
        </button>
      </div>
    </div>
    <div class="fill-section" id="fillSection" data-fill="solid">
      <div class="field">
        <label>種類</label>
        <div class="fill-mode-segmented" id="fillModeSeg" role="radiogroup" aria-label="塗りの種類">
          <button type="button" class="fill-mode-seg" data-value="solid" role="radio" aria-checked="true">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3" fill="currentColor"/></svg>
            単色
          </button>
          <button type="button" class="fill-mode-seg" data-value="gradient" role="radio" aria-checked="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><defs><linearGradient id="fmGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="currentColor" stop-opacity="0.9"/><stop offset="100%" stop-color="currentColor" stop-opacity="0.15"/></linearGradient></defs><rect x="3" y="3" width="18" height="18" rx="3" fill="url(#fmGrad)"/></svg>
            グラデ
          </button>
        </div>
      </div>
      <div class="fill-body">
        <div class="fill-stops">
          <div class="color-fields">
            <span class="color-label" id="bgColorLabel">背景</span>
            <input type="color" id="bg" value="#ffffff" title="背景色">
            <input type="text" id="bgHex" value="#ffffff" title="背景色">
          </div>
          <div class="color-fields grad-only">
            <span class="color-label">終了</span>
            <input type="color" id="gradColor" value="#7c3aed" title="グラデーション終点">
            <input type="text" id="gradColorHex" value="#7c3aed" title="グラデーション終点">
          </div>
        </div>
        <div class="grad-angle-wrap grad-only">
          <button type="button" id="gradAngleDial" class="grad-dial" role="slider" tabindex="0" aria-label="グラデーションの角度" aria-valuemin="0" aria-valuemax="360" aria-valuenow="135" title="ドラッグまたは矢印キーで角度を変更">
            <svg viewBox="-50 -50 100 100" aria-hidden="true">
              <circle cx="0" cy="0" r="38" fill="rgba(8,12,24,0.55)" stroke="var(--border-strong)" stroke-width="1"/>
              <g stroke="var(--text-faint)" stroke-width="1.4" stroke-linecap="round" opacity="0.75">
                <line x1="0" y1="-38" x2="0" y2="-32"/>
                <line x1="38" y1="0" x2="32" y2="0"/>
                <line x1="0" y1="38" x2="0" y2="32"/>
                <line x1="-38" y1="0" x2="-32" y2="0"/>
              </g>
              <g id="gradAngleNeedle" transform="rotate(135)">
                <line x1="0" y1="0" x2="0" y2="-30" stroke="var(--accent)" stroke-width="2.6" stroke-linecap="round"/>
                <circle cx="0" cy="-30" r="4.5" fill="var(--accent)" stroke="#fff" stroke-width="1"/>
              </g>
              <circle cx="0" cy="0" r="2.4" fill="var(--text-muted)"/>
            </svg>
          </button>
          <div class="grad-angle-num">
            <input type="number" id="gradAngle" value="135" min="0" max="360" step="15">
            <span class="unit">°</span>
          </div>
        </div>
      </div>
      <div class="color-fields">
        <span class="color-label">文字</span>
        <input type="color" id="fg" value="#000000" title="文字色">
        <input type="text" id="fgHex" value="#000000" title="文字色">
      </div>
      <input type="checkbox" id="grad" hidden>
    </div>

    <h2>文字</h2>
    <div class="field"><label>フォント</label>
      <span class="info-tip" id="fontInfoTip" tabindex="0" aria-label="Google Fonts について" data-tip="Google Fonts は初回コピー時に SVG パスへ変換されます。これで同じ URL を別のデバイスから開いても同じ見た目で表示できます。"></span>
      <select id="font"></select>
      <button type="button" id="randomFont" class="preset-btn random-btn" title="フォントをランダム選択" aria-label="フォントをランダム選択">
        <svg class="dice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8" cy="8" r="1.3" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="16" cy="16" r="1.3" fill="currentColor" stroke="none"/></svg>
      </button>
    </div>
    <div class="field custom-font" id="customFontWrap">
      <label></label>
      <input type="text" id="fontCustom" placeholder="例: Impact / 'Comic Sans MS' / Futura">
    </div>
    <div class="field"><label>字サイズ</label>
      <input type="checkbox" id="sizeAuto" checked>
      <span style="color:#94a3b8;font-size:.75rem;flex:none;">自動</span>
      <div class="size-stepper">
        <button type="button" id="sizeDown" class="size-step-btn" title="小さく" aria-label="文字を小さく">
          <span class="small">A</span><span style="opacity:.6">−</span>
        </button>
        <button type="button" id="sizeUp" class="size-step-btn" title="大きく" aria-label="文字を大きく">
          <span class="large">A</span><span style="opacity:.6">+</span>
        </button>
      </div>
      <input type="number" id="size" value="160" min="4" max="800" disabled>
      <span class="unit">px</span>
    </div>
    <input type="range" id="sizeRange" min="10" max="400" step="1" value="160" hidden>
    <div class="field"><label>太さ</label>
      <div class="weight-segmented" id="weightSeg" role="radiogroup" aria-label="文字の太さ">
        <button type="button" class="weight-seg" data-value="300" title="300 (Light)" role="radio" aria-checked="false">
          <span class="sample" style="font-weight:300">Aa</span>
          <span class="num">300</span>
        </button>
        <button type="button" class="weight-seg" data-value="400" title="400 (Regular)" role="radio" aria-checked="false">
          <span class="sample" style="font-weight:400">Aa</span>
          <span class="num">400</span>
        </button>
        <button type="button" class="weight-seg" data-value="500" title="500 (Medium)" role="radio" aria-checked="false">
          <span class="sample" style="font-weight:500">Aa</span>
          <span class="num">500</span>
        </button>
        <button type="button" class="weight-seg" data-value="700" title="700 (Bold)" role="radio" aria-checked="false">
          <span class="sample" style="font-weight:700">Aa</span>
          <span class="num">700</span>
        </button>
        <button type="button" class="weight-seg" data-value="900" title="900 (Black)" role="radio" aria-checked="false">
          <span class="sample" style="font-weight:900">Aa</span>
          <span class="num">900</span>
        </button>
      </div>
      <select id="weight" hidden>
        <option>300</option><option>400</option><option>500</option>
        <option selected>700</option><option>900</option>
      </select>
    </div>
    <div class="field">
      <label>揃え</label>
        <div class="align-segmented" id="alignSeg" role="radiogroup" aria-label="文字揃え">
          <button type="button" class="align-seg" data-value="left" title="左揃え" aria-label="左揃え" role="radio" aria-checked="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="21" y1="6" x2="3" y2="6"/><line x1="15" y1="12" x2="3" y2="12"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
          </button>
          <button type="button" class="align-seg" data-value="center" title="中央揃え" aria-label="中央揃え" role="radio" aria-checked="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="21" y1="6" x2="3" y2="6"/><line x1="17" y1="12" x2="7" y2="12"/><line x1="19" y1="18" x2="5" y2="18"/></svg>
          </button>
          <button type="button" class="align-seg" data-value="right" title="右揃え" aria-label="右揃え" role="radio" aria-checked="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="12" x2="9" y2="12"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
          </button>
          <button type="button" class="align-seg" data-value="justify" title="両端揃え" aria-label="両端揃え" role="radio" aria-checked="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="12" x2="3" y2="12"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
          </button>
        </div>
        <select id="align" hidden>
          <option value="center">中央</option>
          <option value="left">左</option>
          <option value="right">右</option>
          <option value="justify">両端</option>
        </select>
      </div>
    <div class="row">
      <div class="field"><label>行高</label>
        <input type="number" id="lh" value="1.2" step="0.1" min="0.5" max="3">
      </div>
      <div class="field"><label>字間</label>
        <input type="number" id="ls" value="0" step="0.5" min="-20" max="50"><span class="unit">px</span>
      </div>
    </div>

    <h2>サイズ</h2>
    <div class="row size-row">
      <div class="field"><label>幅</label>
        <input type="number" id="w" value="600" min="1" max="4000"></div>
      <div class="field"><label>高さ</label>
        <input type="number" id="h" value="400" min="1" max="4000"></div>
      <div class="field"><label>余白</label>
        <input type="number" id="padding" value="24" min="0" max="500"></div>
      <div class="field"><label>角丸</label>
        <input type="number" id="radius" value="0" min="0" max="500"></div>
    </div>
    <div class="field">
      <label>回転</label>
      <button type="button" id="rotateBtn" class="rotate-btn" title="90° ずつ回転" aria-label="90° ずつ回転">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 4 21 10 15 10"/></svg>
        <span id="rotateLabel">0°</span>
      </button>
      <input type="hidden" id="rotate" value="0">
    </div>

    <h2>効果</h2>
    <div class="effect-section">
      <div class="field decor-field">
        <label>影</label>
        <input type="checkbox" id="shadow">
        <input type="color" id="shadowColor" value="#000000" title="影の色">
        <span class="unit">ぼかし</span>
        <input type="number" id="shadowBlur" value="4" min="0" max="40" step="1">
      </div>
      <div class="field decor-field">
        <label>縁取り</label>
        <input type="checkbox" id="stroke">
        <input type="color" id="strokeColor" value="#000000" title="縁取りの色">
        <span class="unit">幅</span>
        <input type="number" id="strokeWidth" value="2" min="0" max="40" step="0.5">
      </div>
    </div>
  </form>

  <div class="preview-wrap">
    <div class="preview-box">
      <div id="previewFrame" class="preview-frame">
        <img id="preview" alt="preview">
        <div id="resizeTL" class="resize-handle handle-tl"></div>
        <div id="resizeT"  class="resize-handle handle-t"></div>
        <div id="resizeTR" class="resize-handle handle-tr"></div>
        <div id="resizeL"  class="resize-handle handle-l"></div>
        <div id="resizeR"  class="resize-handle handle-r"></div>
        <div id="resizeBL" class="resize-handle handle-bl"></div>
        <div id="resizeB"  class="resize-handle handle-b"></div>
        <div id="resizeBR" class="resize-handle handle-br"></div>
        <div id="paddingFrame" class="padding-frame"></div>
        <div id="paddingHandle" class="padding-handle" title="余白を変更"></div>
        <div id="radiusHandle" class="radius-handle" title="角丸を変更"></div>
      </div>
      <div id="sizeReadout" class="size-readout"></div>
    </div>

    <div class="panel url-box">
      <h2>画像URL</h2>
      <div class="url-row">
        <input id="url" readonly>
        <button type="button" data-copy="url">コピー</button>
      </div>
      <h2 class="sub">Cosense 記法</h2>
      <div class="url-row">
        <input id="cosense" readonly>
        <button type="button" data-copy="cosense">コピー</button>
      </div>
      <h2 class="sub">Markdown</h2>
      <div class="url-row">
        <input id="markdown" readonly>
        <button type="button" data-copy="markdown">コピー</button>
      </div>
      <p class="help" id="copyStatus" style="margin-top:.5rem; min-height:1.2em;"></p>
    </div>
  </div>

  <aside class="panel fav-pane" id="favPane" hidden aria-label="お気に入り一覧">
    <div class="fav-pane-head">
      <h2>お気に入り</h2>
      <button type="button" id="favPaneClose" class="fav-pane-close" title="ペインを閉じる" aria-label="ペインを閉じる">×</button>
    </div>
    <button type="button" id="favSaveBtn" class="fav-save-btn" title="現在の状態をお気に入りに追加">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 15 9 22 10 17 15 18 22 12 18 6 22 7 15 2 10 9 9 12 2"/></svg>
      <span id="favSaveLabel">現在の状態を保存</span>
    </button>
    <div class="fav-list" id="favList"></div>
  </aside>
</main>
<div id="authModal" class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
  <div class="auth-modal-card">
    <div id="authModalTitle" class="auth-modal-title">認証してください</div>
    <div id="turnstileWidget"></div>
    <button type="button" id="authCancel" class="auth-modal-cancel">キャンセル</button>
  </div>
</div>
<footer>
  source: <a href="https://github.com/shinyaoguri/cosense-icon" target="_blank" rel="noopener">shinyaoguri/cosense-icon</a>
  ・ fonts: <a href="https://fonts.google.com/" target="_blank" rel="noopener">Google Fonts</a> (OFL / Apache 2.0)
</footer>
<!-- BUNDLE -->
</body>
</html>
