<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cosense-icon editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/wawoff2@2.0.1/build/decompress_binding.js" defer></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onloadTurnstileCallback&render=explicit" async defer onerror="console.error('Turnstile script load failed')"></script>
<style>
:root {
  --bg: #060a14;
  --bg-elev: #0f172a;
  --surface: #141d33;
  --surface-hover: #1d2943;
  --border: #273149;
  --border-strong: #3b4a6b;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --text-faint: #64748b;
  --accent: #38bdf8;
  --accent-hover: #7dd3fc;
  --accent-soft: rgba(56, 189, 248, 0.12);
  --success: #4ade80;
  --success-soft: rgba(74, 222, 128, 0.1);
  --warn: #fbbf24;
  --warn-soft: rgba(251, 191, 36, 0.1);
  --error: #f87171;
  --error-soft: rgba(248, 113, 113, 0.1);
  --violet: #a78bfa;
  --violet-soft: rgba(167, 139, 250, 0.12);
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.25);
  --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.45);
  --shadow-ring: 0 0 0 3px var(--accent-soft);
  --transition: 160ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-fast: 120ms cubic-bezier(0.4, 0, 0.2, 1);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', Meiryo, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }

/* フォーカスリング: ボタン系は outline、入力系は box-shadow リング */
:focus { outline: none; }
button:focus-visible,
[role="radio"]:focus-visible,
.font-picker-btn:focus-visible,
.size-step-btn:focus-visible,
.weight-seg:focus-visible,
.align-seg:focus-visible,
.preset-btn:focus-visible,
.rotate-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
body {
  font-family: var(--font-sans);
  font-feature-settings: "cv11", "ss01", "ss03";
  background: radial-gradient(ellipse at 20% -10%, #11213f 0%, var(--bg) 55%);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* header */
header {
  flex: none;
  padding: 0.85rem 2rem;
  border-bottom: 1px solid var(--border);
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
header h1 {
  margin: 0;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: -0.015em;
  display: flex;
  align-items: center;
  gap: 0.55rem;
}
header h1::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
}
header p {
  display: inline;
  margin: 0 0 0 0.9rem;
  color: var(--text-faint);
  font-size: 0.76rem;
  font-weight: 400;
  letter-spacing: -0.005em;
}
header h1, header p { vertical-align: middle; }

/* main */
main {
  flex: 1 1 auto;
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(340px, 420px) 1fr;
  gap: 1.25rem;
  padding: 1.25rem 2rem;
  max-width: 1360px;
  width: 100%;
  margin: 0 auto;
  overflow: hidden;
}
@media (max-width: 820px) {
  html, body { height: auto; overflow: visible; }
  body { display: block; }
  main { grid-template-columns: 1fr; padding: 1rem; gap: 1rem; overflow: visible; }
  form.panel { max-height: none; overflow: visible; }
  .preview-wrap { overflow: visible; }
}

/* panel */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 1.15rem 1.3rem;
  box-shadow: var(--shadow-md);
  background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.012) 0%, transparent 60%);
}

/* 左カラム: form は中でスクロール */
form.panel {
  max-height: 100%;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
}
form.panel::-webkit-scrollbar { width: 8px; }
form.panel::-webkit-scrollbar-track { background: transparent; }
form.panel::-webkit-scrollbar-thumb {
  background: var(--border-strong);
  border-radius: 4px;
  border: 2px solid var(--surface);
}
.panel h2 {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-faint);
  margin: 0 0 0.85rem;
  font-weight: 600;
}
.panel h2:not(:first-child),
.panel .row-head:not(:first-child) {
  margin-top: 1.25rem;
}

.row-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 0 0 0.8rem;
}
.row-head h2 { margin: 0; }

/* field */
.field {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.55rem;
  font-size: 0.85rem;
}
.field > label {
  color: var(--text-muted);
  min-width: 3.8rem;
  flex: none;
  font-weight: 500;
  font-size: 0.8rem;
}
.field input[type=text],
.field select,
.field textarea {
  flex: 1;
  min-width: 0;
  background: var(--bg-elev);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.45rem 0.6rem;
  font: inherit;
  font-size: 0.85rem;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.field input[type=number] {
  background: var(--bg-elev);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.4rem 0.5rem;
  font: inherit;
  font-size: 0.85rem;
  width: 4.8rem;
  flex: none;
  text-align: right;
  transition: border-color var(--transition), box-shadow var(--transition);
  font-variant-numeric: tabular-nums;
}
.field input:hover:not(:focus):not(:disabled),
.field select:hover:not(:focus),
.field textarea:hover:not(:focus) {
  border-color: var(--border-strong);
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.field input:disabled { opacity: 0.45; cursor: not-allowed; }
.field input[type=color] {
  width: 2.2rem;
  height: 2.2rem;
  padding: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: transparent;
  cursor: pointer;
  flex: none;
  transition: border-color var(--transition), transform var(--transition);
}
.field input[type=color]:hover {
  border-color: var(--border-strong);
  transform: scale(1.05);
}
.field input[type=checkbox] {
  accent-color: var(--accent);
  margin: 0;
  flex: none;
  width: 1rem;
  height: 1rem;
  cursor: pointer;
}
.field textarea { min-height: 5rem; resize: vertical; font-family: inherit; }
.field .unit {
  color: var(--text-faint);
  font-size: 0.72rem;
  flex: none;
  font-variant-numeric: tabular-nums;
}

/* slider */
input[type=range] {
  flex: 1;
  min-width: 0;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  padding: 0;
  margin: 0;
  cursor: pointer;
  transition: background var(--transition);
}
input[type=range]:hover { background: var(--border-strong); }
input[type=range]:disabled { opacity: 0.35; cursor: not-allowed; }
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid var(--bg-elev);
  box-shadow: 0 0 0 1px var(--border-strong);
  transition: transform var(--transition), box-shadow var(--transition);
}
input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
  box-shadow: 0 0 0 1px var(--accent);
}
input[type=range]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid var(--bg-elev);
  box-shadow: 0 0 0 1px var(--border-strong);
}

/* row */
.row { display: flex; gap: 0.75rem; }
.row > * { flex: 1; }

/* サイズ row: 4 つの数値入力をコンパクトに */
.size-row { gap: 0.45rem; }
.size-row .field { gap: 0.4rem; min-width: 0; }
.size-row .field > label {
  min-width: auto;
  font-size: 0.78rem;
}
.size-row .field input[type=number] {
  width: auto;
  flex: 1;
  min-width: 0;
  text-align: right;
}

/* stack */
.stack {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
  margin-bottom: 0.55rem;
}
.stack textarea {
  background: var(--bg-elev);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.15rem;
  font: inherit;
  font-size: 1.2rem;
  font-weight: 600;
  min-height: 5.5rem;
  resize: vertical;
  line-height: 1.45;
  letter-spacing: -0.005em;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.stack textarea::placeholder {
  color: var(--text-faint);
  font-weight: 400;
  font-size: 0.95rem;
}
.stack textarea:hover:not(:focus) { border-color: var(--border-strong); }
.stack textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

/* preview */
.preview-wrap {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  min-height: 0;
  overflow: hidden;
}
.preview-box {
  flex: 1 1 auto;
  min-height: 0;
  background-color: #080c18;
  background-image:
    linear-gradient(rgba(39, 49, 73, 0.55) 1px, transparent 1px),
    linear-gradient(90deg, rgba(39, 49, 73, 0.55) 1px, transparent 1px);
  background-size: 32px 32px;
  background-position: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.75rem;
  position: relative;
  overflow: hidden;
}
.preview-box::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(8, 12, 24, 0.75) 100%);
  pointer-events: none;
}
.preview-frame {
  position: relative;
  z-index: 1;
  max-width: 100%;
  max-height: 100%;
  display: block;
}
.preview-frame img {
  width: 100%;
  height: 100%;
  display: block;
  box-shadow: var(--shadow-lg);
  border-radius: 2px;
}
/* 選択枠 (PowerPoint 風) */
.preview-frame::before {
  content: '';
  position: absolute;
  inset: -1px;
  border: 1px solid var(--accent);
  pointer-events: none;
  opacity: 0;
  transition: opacity var(--transition-fast);
  z-index: 2;
}
.preview-box:hover .preview-frame::before,
.preview-frame.dragging::before { opacity: 0.85; }

/* リサイズハンドル: 8 個の小さな白丸 */
.resize-handle {
  position: absolute;
  width: 10px;
  height: 10px;
  background: #fff;
  border: 1.5px solid var(--accent);
  border-radius: 50%;
  z-index: 3;
  opacity: 0;
  transition: opacity var(--transition-fast), transform var(--transition-fast);
  box-shadow: var(--shadow-sm);
  touch-action: none;
}
.preview-box:hover .resize-handle,
.resize-handle.dragging { opacity: 1; }
.resize-handle:hover { transform: scale(1.3); }
.resize-handle.dragging { transform: scale(1.3); }

/* 四隅 */
.handle-tl { top: -6px; left: -6px; cursor: nwse-resize; }
.handle-tr { top: -6px; right: -6px; cursor: nesw-resize; }
.handle-bl { bottom: -6px; left: -6px; cursor: nesw-resize; }
.handle-br { bottom: -6px; right: -6px; cursor: nwse-resize; }
/* 各辺中点 */
.handle-t { top: -6px; left: 50%; margin-left: -5px; cursor: ns-resize; }
.handle-b { bottom: -6px; left: 50%; margin-left: -5px; cursor: ns-resize; }
.handle-l { left: -6px; top: 50%; margin-top: -5px; cursor: ew-resize; }
.handle-r { right: -6px; top: 50%; margin-top: -5px; cursor: ew-resize; }

/* サイズ表示バッジ (PowerPoint 風) */
.size-readout {
  position: absolute;
  top: 0.85rem;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15, 23, 42, 0.85);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 3px 10px;
  font-size: 0.72rem;
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  transition: opacity var(--transition-fast);
}
.preview-box:hover .size-readout,
.preview-frame.dragging ~ .size-readout { opacity: 1; }

/* 余白 (padding) ガイドとハンドル */
.padding-frame {
  position: absolute;
  pointer-events: none;
  border: 1px dashed var(--accent);
  opacity: 0;
  transition: opacity var(--transition-fast);
  z-index: 2;
}
.preview-box:hover .padding-frame,
.preview-frame.dragging .padding-frame { opacity: 0.5; }
.padding-handle {
  position: absolute;
  width: 9px;
  height: 9px;
  background: var(--accent);
  border: 1.5px solid #fff;
  border-radius: 50%;
  pointer-events: auto;
  z-index: 4;
  opacity: 0;
  transition: opacity var(--transition-fast), transform var(--transition-fast);
  box-shadow: var(--shadow-sm);
  touch-action: none;
  cursor: nwse-resize;
  margin: 0 -5px -5px 0;
}
.preview-box:hover .padding-handle,
.padding-handle.dragging { opacity: 1; }
.padding-handle:hover { transform: scale(1.3); }
.padding-handle.dragging { transform: scale(1.3); }

/* 角丸ハンドル (PowerPoint 風 黄色) */
.radius-handle {
  position: absolute;
  width: 9px;
  height: 9px;
  background: var(--warn);
  border: 1.5px solid #fff;
  border-radius: 50%;
  pointer-events: auto;
  z-index: 5;
  opacity: 0;
  transition: opacity var(--transition-fast), transform var(--transition-fast);
  box-shadow: var(--shadow-sm);
  touch-action: none;
  cursor: nwse-resize;
  margin: -5px 0 0 -5px;
}
.preview-box:hover .radius-handle,
.radius-handle.dragging { opacity: 1; }
.radius-handle:hover { transform: scale(1.3); }
.radius-handle.dragging { transform: scale(1.3); }
.preview-wrap > .panel { flex: none; }

/* URL box */
.url-box h2 { margin-top: 0; }
.url-box h2.sub { margin-top: 1rem; }
.url-row {
  display: flex;
  gap: 0.5rem;
}
.url-row input {
  flex: 1;
  min-width: 0;
  background: var(--bg-elev);
  color: var(--accent);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.55rem 0.85rem;
  font-family: var(--font-mono);
  font-size: 0.76rem;
  letter-spacing: -0.01em;
  font-variant-ligatures: none;
  transition: border-color var(--transition);
}
.url-row input:hover { border-color: var(--border-strong); }
.url-row input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.url-row input.pending {
  color: var(--text-faint);
  font-style: italic;
  border-style: dashed;
  background:
    repeating-linear-gradient(
      135deg,
      transparent 0,
      transparent 8px,
      rgba(251, 191, 36, 0.06) 8px,
      rgba(251, 191, 36, 0.06) 16px
    ),
    var(--bg-elev);
}
.url-row button {
  background: var(--accent);
  color: #07101f;
  border: 0;
  border-radius: var(--radius-md);
  padding: 0 1.1rem;
  font-weight: 600;
  cursor: pointer;
  font: inherit;
  font-size: 0.82rem;
  transition: background var(--transition), transform var(--transition);
  flex: none;
  min-width: 5rem;
}
.url-row button:hover { background: var(--accent-hover); }
.url-row button:active { transform: translateY(1px); }
.url-row button.copied { background: var(--success); }
.url-row button:disabled {
  background: var(--border-strong);
  color: var(--text-faint);
  cursor: not-allowed;
  transform: none;
}

/* help text */
.help {
  font-size: 0.75rem;
  color: var(--text-faint);
  margin: 0.75rem 0 0;
  line-height: 1.55;
}
.help code {
  background: var(--bg-elev);
  color: var(--text);
  padding: 0.05em 0.4em;
  border-radius: var(--radius-sm);
  font-size: 0.95em;
  font-family: var(--font-mono);
  border: 1px solid var(--border);
}

/* preset chips */
.presets {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}
.preset-btn {
  background: var(--bg-elev);
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 0.32rem 0.85rem;
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  font: inherit;
  line-height: 1.2;
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.35rem;
}
.preset-btn .dice-icon {
  width: 14px;
  height: 14px;
  display: block;
  flex: none;
}
.preset-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}
.preset-btn.reset-btn { color: var(--text-faint); }
.preset-btn.reset-btn:hover {
  border-color: var(--error);
  color: var(--error);
  background: var(--error-soft);
}
.preset-btn.random-btn {
  background: transparent;
  border: 0;
  padding: 0.25rem;
  color: var(--text-muted);
}
.preset-btn.random-btn:hover {
  background: transparent;
  border: 0;
  color: var(--violet);
}
.preset-btn.random-btn .dice-icon {
  width: 22px;
  height: 22px;
}
@keyframes diceSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.dice-icon.spinning {
  animation: diceSpin 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* contrast label (badge) */
.contrast-label {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-faint);
  padding: 0.25rem 0.6rem;
  border-radius: 99px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  margin: 0;
  font-variant-numeric: tabular-nums;
  line-height: 1.2;
}
.contrast-label::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.7;
}
.contrast-label.ok {
  color: var(--success);
  border-color: rgba(74, 222, 128, 0.35);
  background: var(--success-soft);
}
.contrast-label.warn {
  color: var(--warn);
  border-color: rgba(251, 191, 36, 0.35);
  background: var(--warn-soft);
}
.contrast-label.ng {
  color: var(--error);
  border-color: rgba(248, 113, 113, 0.35);
  background: var(--error-soft);
}

.custom-font { margin-top: 0.25rem; display: none; }
.custom-font.show { display: flex; }

/* インフォメーションのアイコン (hover でツールチップ) */
.info-tip {
  display: none;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--bg-elev);
  color: var(--text-faint);
  border: 1px solid var(--border);
  cursor: help;
  position: relative;
  flex: none;
  font-style: italic;
  font-family: 'Times New Roman', serif;
  font-size: 0.72rem;
  font-weight: 600;
  line-height: 1;
  transition: color var(--transition), border-color var(--transition);
}
.info-tip.show { display: inline-flex; }
.info-tip:hover, .info-tip:focus-visible {
  color: var(--accent);
  border-color: var(--accent);
  outline: none;
}
.info-tip::before { content: 'i'; }
.info-tip::after {
  content: attr(data-tip);
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.55rem 0.7rem;
  font-size: 0.72rem;
  font-style: normal;
  font-family: inherit;
  font-weight: 400;
  width: max-content;
  max-width: 240px;
  box-shadow: var(--shadow-md);
  pointer-events: none;
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity var(--transition-fast), transform var(--transition-fast);
  z-index: 100;
  text-align: left;
  line-height: 1.5;
  white-space: normal;
}
.info-tip:hover::after,
.info-tip:focus-visible::after {
  opacity: 1;
  transform: translateY(0);
}

/* 字サイズ A-/A+ ボタン (Word 風 - 連結された stepper) */
.size-stepper {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-elev);
  overflow: hidden;
  flex: none;
}
.size-step-btn {
  background: transparent;
  color: var(--text-muted);
  border: 0;
  border-right: 1px solid var(--border);
  border-radius: 0;
  padding: 0.35rem 0.6rem;
  cursor: pointer;
  font: inherit;
  font-size: 0.85rem;
  display: inline-flex;
  align-items: center;
  gap: 0.1rem;
  line-height: 1;
  transition: background var(--transition), color var(--transition);
}
.size-step-btn:last-child { border-right: 0; }
.size-step-btn:hover { background: var(--surface-hover); color: var(--accent); }
.size-step-btn .small { font-size: 0.78em; }
.size-step-btn .large { font-size: 1.1em; }

/* 回転ボタン */
.rotate-btn {
  background: var(--bg-elev);
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.4rem 0.75rem;
  font: inherit;
  font-size: 0.8rem;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  transition: all var(--transition);
  font-variant-numeric: tabular-nums;
}
.rotate-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}
.rotate-btn svg { width: 14px; height: 14px; flex: none; }

/* 太さ segmented control (Word 風) */
.weight-segmented {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-elev);
  overflow: hidden;
  flex: none;
}
.weight-seg {
  background: transparent;
  border: 0;
  border-right: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0.3rem 0.55rem 0.28rem;
  cursor: pointer;
  font: inherit;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.1rem;
  min-width: 2.4rem;
  line-height: 1;
  transition: background var(--transition), color var(--transition);
}
.weight-seg:last-child { border-right: 0; }
.weight-seg .sample { font-size: 0.95rem; }
.weight-seg .num {
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}
.weight-seg:hover { background: var(--surface-hover); color: var(--text); }
.weight-seg.active {
  background: var(--accent-soft);
  color: var(--accent);
}
.weight-seg.active .num { color: var(--accent); opacity: 0.85; }

/* 揃え segmented control (Word 風) */
.align-segmented {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-elev);
  overflow: hidden;
  flex: none;
}
.align-seg {
  background: transparent;
  border: 0;
  border-right: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0.4rem 0.55rem;
  cursor: pointer;
  font: inherit;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition), color var(--transition);
}
.align-seg:last-child { border-right: 0; }
.align-seg:hover { background: var(--surface-hover); color: var(--text); }
.align-seg.active {
  background: var(--accent-soft);
  color: var(--accent);
}
.align-seg svg {
  width: 14px;
  height: 14px;
  display: block;
}

/* font picker */
.font-picker { position: relative; flex: 1; min-width: 0; }
.font-picker-btn {
  width: 100%;
  text-align: left;
  padding: 0.45rem 0.6rem;
  background: var(--bg-elev);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font: inherit;
  font-size: 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.font-picker-btn:hover { border-color: var(--border-strong); }
.font-picker-btn:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.font-picker-btn .caret {
  margin-left: auto;
  opacity: 0.5;
  font-size: 0.7em;
  flex: none;
  transition: transform var(--transition);
}
.font-picker-btn .sample {
  color: var(--text-muted);
  font-size: 0.85em;
  flex: none;
}
.font-picker-overlay {
  position: fixed;
  inset: 0;
  background: rgba(6, 10, 20, 0.65);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 99;
  animation: fpFadeIn var(--transition-fast) ease-out;
}
.font-picker-overlay[hidden] { display: none; }
.font-picker-menu {
  position: fixed;
  top: 5vh;
  bottom: 5vh;
  left: 50%;
  transform: translateX(-50%);
  width: min(960px, calc(100vw - 48px));
  max-height: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  z-index: 100;
  box-shadow: var(--shadow-lg);
  padding: 1rem 1rem 1.25rem;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
  animation: fpSlideIn 180ms cubic-bezier(0.2, 0.9, 0.3, 1);
}
.font-picker-menu[hidden] { display: none; }
@keyframes fpFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fpSlideIn {
  from { opacity: 0; transform: translateX(-50%) translateY(12px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.font-picker-menu-scroll {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
}
.font-picker-menu-scroll::-webkit-scrollbar { width: 10px; }
.font-picker-menu-scroll::-webkit-scrollbar-track { background: transparent; }
.font-picker-menu-scroll::-webkit-scrollbar-thumb {
  background: var(--border-strong);
  border-radius: 5px;
  border: 2px solid var(--surface);
}
.font-picker-menu-title {
  flex: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 0.25rem 0.85rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0.75rem;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
}
.font-picker-close {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.2rem 0.65rem;
  font: inherit;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all var(--transition);
}
.font-picker-close:hover {
  border-color: var(--border-strong);
  color: var(--text);
}
.font-picker-group {
  padding: 0.75rem 0.3rem 0.35rem;
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-faint);
  font-weight: 600;
}
.font-picker-group:first-child { padding-top: 0.25rem; }
.font-picker-items {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 2px;
}
.font-picker-item {
  padding: 0.5rem 0.7rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.6rem;
  cursor: pointer;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  transition: background var(--transition);
  min-width: 0;
}
.font-picker-item:hover { background: var(--surface-hover); }
.font-picker-item.active {
  background: var(--accent-soft);
  color: var(--accent);
}
.font-picker-item.active .sample { color: var(--accent); opacity: 0.85; }
.font-picker-item .name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}
.font-picker-item .sample {
  color: var(--text-muted);
  font-size: 0.95em;
  white-space: nowrap;
  flex: none;
}

/* footer */
footer {
  flex: none;
  text-align: center;
  padding: 0.6rem 1rem;
  color: var(--text-faint);
  font-size: 0.7rem;
  letter-spacing: -0.005em;
  border-top: 1px solid var(--border);
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
footer a {
  color: var(--text-muted);
  text-decoration: none;
  transition: color var(--transition);
}
footer a:hover { color: var(--accent); }

/* 認証モーダル */
.auth-modal {
  position: fixed;
  inset: 0;
  background: rgba(6, 10, 20, 0.65);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fpFadeIn var(--transition-fast) ease-out;
}
.auth-modal.show { display: flex; }
.auth-modal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 1.4rem 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  box-shadow: var(--shadow-lg);
  animation: fpSlideIn 180ms cubic-bezier(0.2, 0.9, 0.3, 1);
}
.auth-modal-title {
  font-size: 0.82rem;
  color: var(--text-muted);
  font-weight: 500;
}
#turnstileWidget { color-scheme: dark; min-height: 65px; }
.auth-modal-cancel {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: var(--radius-md);
  padding: 0.4rem 1.1rem;
  cursor: pointer;
  font: inherit;
  font-size: 0.78rem;
  transition: all var(--transition);
}
.auth-modal-cancel:hover {
  border-color: var(--border-strong);
  color: var(--text);
}

/* 登録が必要な状態のコピーボタン */
.url-row button.needs-register {
  background: var(--warn);
  color: #1a1207;
}
.url-row button.needs-register:hover { background: #fcd34d; }

/* 配色: 1行に bg color/hex - random - fg color/hex を並べる */
.color-fields {
  display: flex;
  gap: 0.45rem;
  align-items: center;
}
.color-fields .color-label {
  color: var(--text-muted);
  font-size: 0.8rem;
  font-weight: 500;
  flex: none;
}
.color-fields input[type=color] {
  width: 2.2rem;
  height: 2.2rem;
  padding: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: transparent;
  cursor: pointer;
  flex: none;
  transition: border-color var(--transition), transform var(--transition);
}
.color-fields input[type=color]:hover {
  border-color: var(--border-strong);
  transform: scale(1.05);
}
.color-fields input[type=text] {
  flex: 1;
  min-width: 0;
  background: var(--bg-elev);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 0.45rem 0.55rem;
  font: inherit;
  font-size: 0.82rem;
  transition: border-color var(--transition), box-shadow var(--transition);
  font-family: var(--font-mono);
}
.color-fields input[type=text]:hover { border-color: var(--border-strong); }
.color-fields input[type=text]:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
</style>
</head>
<body>
<header>
  <h1>Cosense Icon Generator</h1>
  <p>テキストと色を URL に埋め込むだけでアイコンを生成する</p>
</header>
<main>
  <form class="panel" id="form" autocomplete="off">
    <h2>テキスト</h2>
    <div class="stack">
      <textarea id="text" placeholder="Type... / 入力..."></textarea>
    </div>

    <div class="row-head">
      <h2 style="margin:0;">配色</h2>
      <div class="contrast-label" id="contrastLabel" hidden></div>
    </div>
    <div class="color-fields">
      <span class="color-label">背景</span>
      <input type="color" id="bg" value="#1e40af" title="背景色">
      <input type="text" id="bgHex" value="#1e40af" title="背景色">
      <button type="button" id="random" class="preset-btn random-btn" title="ランダムな配色 (WCAG AA)" aria-label="ランダムな配色">
        <svg class="dice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8" cy="8" r="1.3" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="16" cy="16" r="1.3" fill="currentColor" stroke="none"/></svg>
      </button>
      <span class="color-label">文字</span>
      <input type="color" id="fg" value="#ffffff" title="文字色">
      <input type="text" id="fgHex" value="#ffffff" title="文字色">
    </div>

    <h2>サイズ</h2>
    <div class="row size-row">
      <div class="field"><label>幅</label>
        <input type="number" id="w" value="600" min="1" max="4000"></div>
      <div class="field"><label>高さ</label>
        <input type="number" id="h" value="400" min="1" max="4000"></div>
      <div class="field"><label>余白</label>
        <input type="number" id="padding" value="24" min="0" max="500"></div>
      <div class="field"><label>角丸</label>
        <input type="number" id="radius" value="0" min="0" max="500"></div>
    </div>
    <div class="field">
      <label>回転</label>
      <button type="button" id="rotateBtn" class="rotate-btn" title="90° ずつ回転" aria-label="90° ずつ回転">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 4 21 10 15 10"/></svg>
        <span id="rotateLabel">0°</span>
      </button>
      <input type="hidden" id="rotate" value="0">
    </div>

    <h2>文字</h2>
    <div class="field"><label>フォント</label>
      <span class="info-tip" id="fontInfoTip" tabindex="0" aria-label="Google Fonts について" data-tip="Google Fonts は初回コピー時に SVG パスへ変換されます。これで同じ URL を別のデバイスから開いても同じ見た目で表示できます。"></span>
      <select id="font"></select>
      <button type="button" id="randomFont" class="preset-btn random-btn" title="フォントをランダム選択" aria-label="フォントをランダム選択">
        <svg class="dice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8" cy="8" r="1.3" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="16" cy="16" r="1.3" fill="currentColor" stroke="none"/></svg>
      </button>
    </div>
    <div class="field custom-font" id="customFontWrap">
      <label></label>
      <input type="text" id="fontCustom" placeholder="例: Impact / 'Comic Sans MS' / Futura">
    </div>
    <div class="field"><label>字サイズ</label>
      <input type="checkbox" id="sizeAuto" checked>
      <span style="color:#94a3b8;font-size:.75rem;flex:none;">自動</span>
      <div class="size-stepper">
        <button type="button" id="sizeDown" class="size-step-btn" title="小さく" aria-label="文字を小さく">
          <span class="small">A</span><span style="opacity:.6">−</span>
        </button>
        <button type="button" id="sizeUp" class="size-step-btn" title="大きく" aria-label="文字を大きく">
          <span class="large">A</span><span style="opacity:.6">+</span>
        </button>
      </div>
      <input type="number" id="size" value="160" min="4" max="800" disabled>
      <span class="unit">px</span>
    </div>
    <input type="range" id="sizeRange" min="10" max="400" step="1" value="160" hidden>
    <div class="field"><label>太さ</label>
      <div class="weight-segmented" id="weightSeg" role="radiogroup" aria-label="文字の太さ">
        <button type="button" class="weight-seg" data-value="300" title="300 (Light)" role="radio" aria-checked="false">
          <span class="sample" style="font-weight:300">Aa</span>
          <span class="num">300</span>
        </button>
        <button type="button" class="weight-seg" data-value="400" title="400 (Regular)" role="radio" aria-checked="false">
          <span class="sample" style="font-weight:400">Aa</span>
          <span class="num">400</span>
        </button>
        <button type="button" class="weight-seg" data-value="500" title="500 (Medium)" role="radio" aria-checked="false">
          <span class="sample" style="font-weight:500">Aa</span>
          <span class="num">500</span>
        </button>
        <button type="button" class="weight-seg" data-value="700" title="700 (Bold)" role="radio" aria-checked="false">
          <span class="sample" style="font-weight:700">Aa</span>
          <span class="num">700</span>
        </button>
        <button type="button" class="weight-seg" data-value="900" title="900 (Black)" role="radio" aria-checked="false">
          <span class="sample" style="font-weight:900">Aa</span>
          <span class="num">900</span>
        </button>
      </div>
      <select id="weight" hidden>
        <option>300</option><option>400</option><option>500</option>
        <option selected>700</option><option>900</option>
      </select>
    </div>
    <div class="field">
      <label>揃え</label>
        <div class="align-segmented" id="alignSeg" role="radiogroup" aria-label="文字揃え">
          <button type="button" class="align-seg" data-value="left" title="左揃え" aria-label="左揃え" role="radio" aria-checked="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="21" y1="6" x2="3" y2="6"/><line x1="15" y1="12" x2="3" y2="12"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
          </button>
          <button type="button" class="align-seg" data-value="center" title="中央揃え" aria-label="中央揃え" role="radio" aria-checked="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="21" y1="6" x2="3" y2="6"/><line x1="17" y1="12" x2="7" y2="12"/><line x1="19" y1="18" x2="5" y2="18"/></svg>
          </button>
          <button type="button" class="align-seg" data-value="right" title="右揃え" aria-label="右揃え" role="radio" aria-checked="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="12" x2="9" y2="12"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
          </button>
          <button type="button" class="align-seg" data-value="justify" title="両端揃え" aria-label="両端揃え" role="radio" aria-checked="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="12" x2="3" y2="12"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
          </button>
        </div>
        <select id="align" hidden>
          <option value="center">中央</option>
          <option value="left">左</option>
          <option value="right">右</option>
          <option value="justify">両端</option>
        </select>
      </div>
    <div class="row">
      <div class="field"><label>行高</label>
        <input type="number" id="lh" value="1.2" step="0.1" min="0.5" max="3">
      </div>
      <div class="field"><label>字間</label>
        <input type="number" id="ls" value="0" step="0.5" min="-20" max="50"><span class="unit">px</span>
      </div>
    </div>

    <p class="help">未変更の項目はURLに含まれない。テキスト中の改行はURL上 <code>\n</code> に変換される。</p>
  </form>

  <div class="preview-wrap">
    <div class="preview-box">
      <div id="previewFrame" class="preview-frame">
        <img id="preview" alt="preview">
        <div id="resizeTL" class="resize-handle handle-tl"></div>
        <div id="resizeT"  class="resize-handle handle-t"></div>
        <div id="resizeTR" class="resize-handle handle-tr"></div>
        <div id="resizeL"  class="resize-handle handle-l"></div>
        <div id="resizeR"  class="resize-handle handle-r"></div>
        <div id="resizeBL" class="resize-handle handle-bl"></div>
        <div id="resizeB"  class="resize-handle handle-b"></div>
        <div id="resizeBR" class="resize-handle handle-br"></div>
        <div id="paddingFrame" class="padding-frame"></div>
        <div id="paddingHandle" class="padding-handle" title="余白を変更"></div>
        <div id="radiusHandle" class="radius-handle" title="角丸を変更"></div>
      </div>
      <div id="sizeReadout" class="size-readout"></div>
    </div>

    <div class="panel url-box">
      <h2>画像URL</h2>
      <div class="url-row">
        <input id="url" readonly>
        <button type="button" data-copy="url">コピー</button>
      </div>
      <h2 class="sub">Cosense 記法</h2>
      <div class="url-row">
        <input id="cosense" readonly>
        <button type="button" data-copy="cosense">コピー</button>
      </div>
      <h2 class="sub">Markdown</h2>
      <div class="url-row">
        <input id="markdown" readonly>
        <button type="button" data-copy="markdown">コピー</button>
      </div>
      <p class="help" id="copyStatus" style="margin-top:.5rem; min-height:1.2em;"></p>
    </div>
  </div>
</main>
