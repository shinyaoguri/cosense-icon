<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cosense-icon editor</title>
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/wawoff2@2.0.1/build/decompress_binding.js" defer></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer onerror="console.error('Turnstile script load failed')"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', Meiryo, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
  line-height: 1.5;
}
header { padding: 1.25rem 2rem; border-bottom: 1px solid #1e293b; }
header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
header p { margin: .25rem 0 0; color: #94a3b8; font-size: .85rem; }
main {
  display: grid;
  grid-template-columns: minmax(320px, 420px) 1fr;
  gap: 1.5rem;
  padding: 1.5rem 2rem;
  max-width: 1320px;
  margin: 0 auto;
}
@media (max-width: 800px) { main { grid-template-columns: 1fr; padding: 1rem; } }
.panel {
  background: #1e293b;
  border-radius: 10px;
  padding: 1rem 1.25rem;
}
.panel h2 {
  font-size: .7rem;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: #94a3b8;
  margin: 0 0 .75rem;
  font-weight: 600;
}
.field {
  display: flex;
  align-items: center;
  gap: .5rem;
  margin-bottom: .55rem;
  font-size: .85rem;
}
.field > label { color: #cbd5e1; min-width: 3.8rem; flex: none; }
.field input[type=text],
.field select,
.field textarea {
  flex: 1;
  min-width: 0;
  background: #0f172a;
  color: #f1f5f9;
  border: 1px solid #334155;
  border-radius: 5px;
  padding: .35rem .5rem;
  font: inherit;
}
.field input[type=number] {
  background: #0f172a;
  color: #f1f5f9;
  border: 1px solid #334155;
  border-radius: 5px;
  padding: .3rem .4rem;
  font: inherit;
  width: 4.5rem;
  flex: none;
  text-align: right;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: 2px solid #38bdf8;
  outline-offset: -1px;
  border-color: transparent;
}
.field input[type=color] {
  width: 2rem; height: 2rem;
  padding: 0;
  border: 1px solid #334155;
  border-radius: 5px;
  background: transparent;
  cursor: pointer;
  flex: none;
}
.field input[type=checkbox] { accent-color: #38bdf8; margin: 0; flex: none; }
.field textarea { min-height: 4.5rem; resize: vertical; font-family: inherit; }
.field .unit { color: #64748b; font-size: .75rem; flex: none; }
input[type=range] {
  flex: 1;
  min-width: 0;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: #334155;
  border-radius: 2px;
  outline: none;
  padding: 0;
  margin: 0;
}
input[type=range]:disabled { opacity: .4; }
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px; height: 16px;
  background: #38bdf8;
  border-radius: 50%;
  cursor: pointer;
  border: 0;
}
input[type=range]::-moz-range-thumb {
  width: 16px; height: 16px;
  background: #38bdf8;
  border-radius: 50%;
  cursor: pointer;
  border: 0;
}
.row { display: flex; gap: .6rem; }
.row > * { flex: 1; }
.stack { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .55rem; }
.stack textarea {
  background: #0f172a;
  color: #f1f5f9;
  border: 1px solid #334155;
  border-radius: 5px;
  padding: .5rem;
  font: inherit;
  min-height: 4.5rem;
  resize: vertical;
}
.preview-wrap { display: flex; flex-direction: column; gap: 1rem; }
.preview-box {
  background-color: #0b1220;
  background-image:
    linear-gradient(45deg, #1e293b 25%, transparent 25%),
    linear-gradient(-45deg, #1e293b 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #1e293b 75%),
    linear-gradient(-45deg, transparent 75%, #1e293b 75%);
  background-size: 20px 20px;
  background-position: 0 0, 0 10px, 10px -10px, 10px 0;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 320px;
  padding: 1.5rem;
}
.preview-box img {
  max-width: 100%;
  max-height: 60vh;
  box-shadow: 0 12px 40px rgba(0,0,0,.5);
  display: block;
}
.url-box h2 { margin-top: 0; }
.url-box h2.sub { margin-top: .75rem; }
.url-row { display: flex; gap: .5rem; }
.url-row input {
  flex: 1;
  min-width: 0;
  background: #0f172a;
  color: #38bdf8;
  border: 1px solid #334155;
  border-radius: 5px;
  padding: .5rem .75rem;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: .78rem;
}
.url-row button {
  background: #38bdf8;
  color: #0f172a;
  border: 0;
  border-radius: 5px;
  padding: 0 1rem;
  font-weight: 600;
  cursor: pointer;
  font: inherit;
  transition: background .15s;
  flex: none;
}
.url-row button:hover { background: #7dd3fc; }
.url-row button.copied { background: #4ade80; }
.help {
  font-size: .75rem;
  color: #94a3b8;
  margin: .5rem 0 0;
}
.help code {
  background: #0f172a;
  color: #e2e8f0;
  padding: .05em .35em;
  border-radius: 3px;
  font-size: .95em;
}
.presets { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: .75rem; }
.preset-btn {
  background: #0f172a;
  color: #cbd5e1;
  border: 1px solid #334155;
  border-radius: 99px;
  padding: .25rem .7rem;
  font-size: .75rem;
  cursor: pointer;
  font: inherit;
}
.preset-btn:hover { border-color: #38bdf8; color: #38bdf8; }
.preset-btn.reset-btn { color: #94a3b8; }
.preset-btn.reset-btn:hover { border-color: #f87171; color: #f87171; }
.preset-btn.random-btn { color: #a78bfa; border-color: #4c1d95; }
.preset-btn.random-btn:hover { border-color: #a78bfa; background: #1e1b4b; }
.row-head { display: flex; justify-content: space-between; align-items: center; margin: 0 0 .75rem; }
.contrast-label { font-size: .72rem; color: #64748b; margin: -.25rem 0 .75rem; padding-left: .2rem; }
.contrast-label.ok { color: #4ade80; }
.contrast-label.warn { color: #fbbf24; }
.contrast-label.ng { color: #f87171; }
.custom-font { margin-top: .25rem; display: none; }
.custom-font.show { display: flex; }
.font-picker { position: relative; flex: 1; min-width: 0; }
.font-picker-btn {
  width: 100%;
  text-align: left;
  padding: .35rem .5rem;
  background: #0f172a;
  color: #f1f5f9;
  border: 1px solid #334155;
  border-radius: 5px;
  font: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: .5rem;
}
.font-picker-btn:hover { border-color: #64748b; }
.font-picker-btn:focus { outline: 2px solid #38bdf8; outline-offset: -1px; border-color: transparent; }
.font-picker-btn .caret { margin-left: auto; opacity: .5; font-size: .75em; flex: none; }
.font-picker-btn .sample { color: #94a3b8; font-size: .85em; flex: none; }
.font-picker-menu {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  max-height: 340px;
  overflow-y: auto;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 5px;
  z-index: 100;
  box-shadow: 0 12px 40px rgba(0,0,0,.5);
  padding: .25rem;
}
.font-picker-group {
  padding: .45rem .5rem .25rem;
  font-size: .65rem;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: #64748b;
  font-weight: 600;
  position: sticky;
  top: 0;
  background: #0f172a;
}
.font-picker-item {
  padding: .4rem .55rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .75rem;
  cursor: pointer;
  border-radius: 4px;
  font-size: .9rem;
}
.font-picker-item:hover { background: #1e293b; }
.font-picker-item.active { background: #334155; }
.font-picker-item .sample {
  color: #94a3b8;
  font-size: .95em;
  white-space: nowrap;
  flex: none;
}
footer {
  text-align: center;
  padding: 1.5rem;
  color: #64748b;
  font-size: .75rem;
}
footer a { color: #94a3b8; }
</style>
</head>
<body>
<header>
  <h1>Cosense Icon Generator</h1>
</header>
<main>
  <form class="panel" id="form" autocomplete="off">
    <h2>プリセット</h2>
    <div class="presets" id="presets">
      <button type="button" id="reset" class="preset-btn reset-btn">↺ リセット</button>
    </div>

    <h2>テキスト</h2>
    <div class="stack">
      <textarea id="text" placeholder="改行可(Enter)">sample</textarea>
    </div>

    <div class="row-head">
      <h2 style="margin:0;">配色</h2>
      <button type="button" id="random" class="preset-btn random-btn">↻ ランダム</button>
    </div>
    <div class="field"><label>背景</label><input type="color" id="bg" value="#1e40af"><input type="text" id="bgHex" value="#1e40af"></div>
    <div class="field"><label>文字</label><input type="color" id="fg" value="#ffffff"><input type="text" id="fgHex" value="#ffffff"></div>
    <div class="contrast-label" id="contrastLabel"></div>

    <h2>サイズ</h2>
    <div class="field"><label>幅</label>
      <input type="range" id="wRange" min="100" max="2000" step="10" value="600">
      <input type="number" id="w" value="600" min="1" max="4000"><span class="unit">px</span></div>
    <div class="field"><label>高さ</label>
      <input type="range" id="hRange" min="100" max="2000" step="10" value="400">
      <input type="number" id="h" value="400" min="1" max="4000"><span class="unit">px</span></div>
    <div class="field"><label>余白</label>
      <input type="range" id="paddingRange" min="0" max="200" step="1" value="24">
      <input type="number" id="padding" value="24" min="0" max="500"><span class="unit">px</span></div>
    <div class="field"><label>角丸</label>
      <input type="range" id="radiusRange" min="0" max="500" step="1" value="0">
      <input type="number" id="radius" value="0" min="0" max="500"><span class="unit">px</span></div>

    <h2>文字</h2>
    <div class="field"><label>フォント</label>
      <select id="font"></select>
    </div>
    <div class="field custom-font" id="customFontWrap">
      <label></label>
      <input type="text" id="fontCustom" placeholder="例: Impact / 'Comic Sans MS' / Futura">
    </div>
    <p class="help" id="googleFontHelp" style="display:none;">Google Fonts 選択中: URL コピー時に自動的にサーバーへ登録される。</p>
    <div class="field"><label>字サイズ</label>
      <input type="checkbox" id="sizeAuto" checked>
      <span style="color:#94a3b8;font-size:.75rem;flex:none;">自動</span>
      <input type="range" id="sizeRange" min="10" max="400" step="1" value="160" disabled>
      <input type="number" id="size" value="160" min="4" max="800" disabled><span class="unit">px</span></div>
    <div class="row">
      <div class="field"><label>太さ</label>
        <select id="weight">
          <option>300</option><option>400</option><option>500</option>
          <option selected>700</option><option>900</option>
        </select>
      </div>
      <div class="field"><label>揃え</label>
        <select id="align">
          <option value="center">中央</option>
          <option value="left">左</option>
          <option value="right">右</option>
        </select>
      </div>
    </div>
    <div class="field"><label>行高</label>
      <input type="range" id="lhRange" min="0.5" max="3" step="0.05" value="1.2">
      <input type="number" id="lh" value="1.2" step="0.1" min="0.5" max="3"></div>
    <div class="field"><label>字間</label>
      <input type="range" id="lsRange" min="-20" max="50" step="0.5" value="0">
      <input type="number" id="ls" value="0" step="0.5" min="-20" max="50"><span class="unit">px</span></div>

    <p class="help">未変更の項目はURLに含まれない。テキスト中の改行はURL上 <code>\n</code> に変換される。</p>
  </form>

  <div class="preview-wrap">
    <div class="preview-box"><img id="preview" alt="preview"></div>

    <div class="panel url-box">
      <h2>画像URL</h2>
      <div class="url-row">
        <input id="url" readonly>
        <button type="button" data-copy="url">コピー</button>
      </div>
      <h2 class="sub">Cosense 記法</h2>
      <div class="url-row">
        <input id="cosense" readonly>
        <button type="button" data-copy="cosense">コピー</button>
      </div>
      <h2 class="sub">Markdown</h2>
      <div class="url-row">
        <input id="markdown" readonly>
        <button type="button" data-copy="markdown">コピー</button>
      </div>
      <div id="turnstileWidget" class="cf-turnstile" data-callback="onTurnstileToken" data-error-callback="onTurnstileError" data-expired-callback="onTurnstileExpired" style="margin-top:.75rem; display:none;"></div>
      <p class="help" id="copyStatus" style="margin-top:.5rem; min-height:1.2em;"></p>
    </div>
  </div>
</main>
<footer>
  source: <a href="https://github.com/shinyaoguri/cosense-icon" target="_blank" rel="noopener">shinyaoguri/cosense-icon</a>
  ・ fonts: <a href="https://fonts.google.com/" target="_blank" rel="noopener">Google Fonts</a> (OFL / Apache 2.0)
</footer>
<!-- BUNDLE -->
</body>
</html>
